name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Checkout data branch
        id: checkout_data
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: data
          path: data-branch

      - name: Copy debts data
        run: |
          if [ -f data-branch/debts.json ]; then
            cp data-branch/debts.json src/data/debts.json
            cp data-branch/debts.json public/debts.json
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
